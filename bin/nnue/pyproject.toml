[project]
name = "nnue-trainer"
version = "0.1.0"
description = "NNUE training for mimir chess engine"
requires-python = ">=3.12"
dependencies = ["numpy", "torch"]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cpu" }
