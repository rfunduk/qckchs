# Only allow GET, POST, HEAD
if ($request_method !~ ^(GET|POST|HEAD)$) {
    return 405;
}

# Block scanner probes (close connection, no response)
location ~ /\.(env|git|aws|ssh|svn|hg) { return 444; }
location ~ ^/(wp-admin|wp-login|wp-content|wordpress|xmlrpc\.php|phpmyadmin|admin\.php|administrator|cgi-bin) { return 444; }
location ~ \.(php|asp|aspx|jsp|cgi)$ { return 444; }

# Per-IP rate limit (zone defined in /etc/nginx/conf.d/ratelimit.conf)
limit_req zone=qckchs burst=60 nodelay;
limit_req_status 429;

# Security headers
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "same-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header X-Frame-Options "DENY" always;
